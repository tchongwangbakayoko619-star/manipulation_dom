        <title>Supprimer un element lorsqu’on clique dessus</title>
    </head>
    <body>
        <h1>Supprimer un element lorsqu’on clique dessus</h1>
        <div id="monElement">Cliquez-moi pour disparaître !</div>

       <script>
                const element = document.querySelector("#monElement");

               element.addEventListener("click", function() {
                element.remove(); 
         });
        </script>

    </body>
</html>
