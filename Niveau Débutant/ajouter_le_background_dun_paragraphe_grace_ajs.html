<!Doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>ajouter le background a un paragraphe</title>    
</head>
<body>
    <p id="paragraphe">DOM Manipulation</p>
    <script>

              para.style.backgroundColor = "red";
