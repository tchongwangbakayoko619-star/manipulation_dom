<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial  -scale=1.0">
    <title>changer texte</title>
</head>
<body>
    <h1>DOM Manipulation</h1>
    <p id="para">voici un paragraphe</p>
    <button onclick="changeText()">appuyer ici pour changer le contenu du texte </button>
    <script>
        function changeText() {
            document.getElementById("para").innerHTML = "Hello world!";
        }
    </script>
</body>
</html>
